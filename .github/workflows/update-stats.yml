name: 🌸 Update GitHub Stats Cards

on:
  schedule:
    - cron: "0 3 * * *"   # runs daily at 3am UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 📊 Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: >-
            username=${{ github.repository_owner }}
            &show_icons=true
            &hide_border=true
            &bg_color=FFF0F5
            &title_color=E8739A
            &icon_color=c9649a
            &text_color=888888
            &ring_color=E8739A
            &count_private=true
          path: github-stats/stats.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 💅 Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: >-
            username=${{ github.repository_owner }}
            &layout=compact
            &hide_border=true
            &bg_color=FFF0F5
            &title_color=E8739A
            &text_color=888888
            &langs_count=6
          path: github-stats/langs.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 💾 Commit updated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-stats/stats.svg github-stats/langs.svg
          git diff --cached --quiet || git commit -m "🌸 chore: update stats cards"
          git push